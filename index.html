
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title></title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background: #000;
      font-family: Arial, sans-serif;
      color: white;
    }

    #trex {
      position: absolute;
      width: 300px;
      will-change: transform, left, top;
      user-select: none;
      pointer-events: none;
    }

    #title {
      position: fixed;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 20px;
      text-shadow: 0 0 8px #000;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="title"></div>
  <img
    id="trex"
    src="https://static.wikia.nocookie.net/dino/images/e/ec/Jurassic_Park_Tyrannosaurus_Rex_%281%29.png/revision/latest/scale-to-width-down/1200?cb=20221117060622"
    alt="T-Rex running"
  />

  <script>
    window.addEventListener('load', () => {
      const trex = document.getElementById('trex');

      function startAnimation() {
        let x = 100;
        let y = 100;
        let vx = 4;
        let vy = 3;

        let width = trex.offsetWidth;
        let height = trex.offsetHeight;

        x = Math.random() * (window.innerWidth - width);
        y = Math.random() * (window.innerHeight - height);

        trex.style.left = x + 'px';
        trex.style.top = y + 'px';

        function animate() {
          const w = window.innerWidth;
          const h = window.innerHeight;

          x += vx;
          y += vy;
          if (x <= 0 || x + width >= w) {
            vx = -vx;
            trex.style.transform = vx < 0 ? 'scaleX(-1)' : 'scaleX(1)';
          }

          if (y <= 0 || y + height >= h) {
            vy = -vy;
          }

          trex.style.left = x + 'px';
          trex.style.top = y + 'px';

          requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
          width = trex.offsetWidth;
          height = trex.offsetHeight;
          if (x + width > window.innerWidth) x = window.innerWidth - width;
          if (y + height > window.innerHeight) y = window.innerHeight - height;
        });

        trex.style.transform = vx < 0 ? 'scaleX(-1)' : 'scaleX(1)';
        animate();
      }

      if (trex.complete && trex.naturalWidth !== 0) {
        startAnimation();
      } else {
        trex.addEventListener('load', startAnimation);
      }
    });
  </script>
</body>
</html>

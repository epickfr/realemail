
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background: #000;
      font-family: Arial, sans-serif;
      color: white;
    }

    #trex {
      position: absolute;
      width: 300px;
      will-change: transform, left, top;
      user-select: none;
      pointer-events: none;
    }

    #title {
      position: fixed;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 20px;
      text-shadow: 0 0 8px #000;
      z-index: 10;
    }
  </style>
</head>
<body>
  <img
    id="trex"
    src="https://static.wikia.nocookie.net/animal-revolt-battle-sim/images/4/4e/Tyrannosaurus_rex_or_T-rex_A.R.B.S..png/revision/latest?cb=20241103104814"
    alt="T-Rex running"
  />

  <script>
    window.addEventListener('load', () => {
      const trex = document.getElementById('trex');

      let x = 100;
      let y = 100;
      let vx = 4;
      let vy = 3;
      function startAnimation() {
        const rect = trex.getBoundingClientRect();
        let width = rect.width;
        let height = rect.height;

        function resetPosition() {
          const w = window.innerWidth;
          const h = window.innerHeight;
          x = Math.random() * (w - width);
          y = Math.random() * (h - height);
        }

        resetPosition();

        function animate() {
          const w = window.innerWidth;
          const h = window.innerHeight;

          x += vx;
          y += vy;

          if (x <= 0 || x + width >= w) {
            vx = -vx;
            trex.style.transform = vx < 0 ? 'scaleX(-1)' : 'scaleX(1)';
          }

          if (y <= 0 || y + height >= h) {
            vy = -vy;
          }

          trex.style.left = x + 'px';
          trex.style.top = y + 'px';

          requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
          const w = window.innerWidth;
          const h = window.innerHeight;
          width = trex.offsetWidth;
          height = trex.offsetHeight;

          if (x + width > w) x = w - width;
          if (y + height > h) y = h - height;
        });
        trex.style.transform = vx < 0 ? 'scaleX(-1)' : 'scaleX(1)';
        animate();
      }

      if (trex.complete) {
        startAnimation();
      } else {
        trex.addEventListener('load', startAnimation);
      }
    });
  </script>
</body>
</html>
